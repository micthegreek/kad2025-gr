<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f2347"/>
  <rect width="1200" height="630" fill="url(#grad)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2347;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Logo -->
  <text x="80" y="120" font-family="Arial,sans-serif" font-weight="bold" font-size="72" fill="#f5c842">ΚΑΔ</text>
  <text x="260" y="120" font-family="Arial,sans-serif" font-weight="bold" font-size="72" fill="white">2025</text>
  <text x="80" y="155" font-family="Arial,sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">.gr</text>
  <!-- Main text -->
  <text x="80" y="260" font-family="Arial,sans-serif" font-weight="bold" font-size="52" fill="white">Αντιστοίχηση &amp; Αναζήτηση</text>
  <text x="80" y="330" font-family="Arial,sans-serif" font-weight="bold" font-size="52" fill="#f5c842">ΚΑΔ 2008 ↔ ΚΑΔ 2025</text>
  <!-- Stats -->
  <rect x="80" y="400" width="300" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="230" y="448" font-family="Arial,sans-serif" font-weight="bold" font-size="32" fill="white" text-anchor="middle">10.921</text>
  <text x="230" y="472" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">κωδικοί</text>
  <rect x="410" y="400" width="300" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="560" y="448" font-family="Arial,sans-serif" font-weight="bold" font-size="32" fill="#f5c842" text-anchor="middle">Excel &amp; CSV</text>
  <text x="560" y="472" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">εξαγωγή</text>
  <rect x="740" y="400" width="380" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="930" y="448" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="white" text-anchor="middle">ΑΑΔΕ Α.1003/2026</text>
  <text x="930" y="472" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">επίσημα δεδομένα</text>
  <!-- Bottom -->
  <text x="80" y="590" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">www.kad2025.gr — Ισχύς από 1/3/2026</text>
</svg>
